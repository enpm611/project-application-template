name: Auto-close pull requests

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  close-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR (except owner)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Ignore PRs created by the repository owner
            if (pr.user.login === context.repo.owner) {
              console.log("PR opened by repo owner — skipping auto-close.");
              return;
            }

            const prNumber = pr.number;

            // Comment on the PR
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body: "Thanks for your interest! 🚫 This repository does not accept pull requests."
            });

            // Close the PR
            await github.rest.pulls.update({
              ...context.repo,
              pull_number: prNumber,
              state: "closed"
            });
